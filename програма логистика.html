<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogiIntent AI — Предиктивная генерация лидов</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #181b24;
      --surface-hover: #222630;
      --primary: #3b82f6;
      --primary-glow: rgba(59, 130, 246, 0.3);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text: #e5e7eb;
      --text-muted: #9ca3af;
      --radius: 12px;
      --shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      line-height: 1.5;
    }

    #bg-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.6; }

    .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    .sidebar {
      background: var(--surface);
      padding: 24px;
      border-right: 1px solid rgba(255,255,255,0.05);
      display: flex; flex-direction: column; gap: 16px;
    }
    .logo {
      font-size: 20px; font-weight: 700;
      background: linear-gradient(90deg, var(--primary), #8b5cf6);
      -webkit-background-clip: text; color: transparent;
      margin-bottom: 32px;
    }
    .nav-item {
      padding: 12px 16px; border-radius: var(--radius);
      cursor: pointer; transition: all 0.25s ease;
      display: flex; align-items: center; gap: 10px;
    }
    .nav-item:hover, .nav-item.active {
      background: var(--surface-hover);
      transform: translateX(4px);
    }
    .nav-item.active { border-left: 3px solid var(--primary); }

    .main { padding: 32px; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
    .title { font-size: 28px; font-weight: 700; }
    .subtitle { color: var(--text-muted); margin-top: 6px; }

    .btn {
      padding: 10px 18px; border: none; border-radius: var(--radius);
      background: var(--primary); color: white; cursor: pointer;
      font-weight: 500; transition: all 0.25s ease;
      box-shadow: 0 4px 12px var(--primary-glow);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px var(--primary-glow); }
    .btn:active { transform: translateY(0); }
    .btn.secondary { background: transparent; border: 1px solid rgba(255,255,255,0.1); box-shadow: none; }

    .pipeline { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 24px; }
    .lead-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 20px; box-shadow: var(--shadow);
      transform-style: preserve-3d; perspective: 800px;
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s ease;
      cursor: pointer; position: relative; overflow: hidden;
    }
    .lead-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent);
      opacity: 0; transition: opacity 0.3s ease;
    }
    .lead-card:hover { transform: rotateX(4deg) rotateY(-3deg) translateY(-4px); box-shadow: 0 12px 28px rgba(0,0,0,0.4); }
    .lead-card:hover::before { opacity: 1; }

    .badge {
      display: inline-block; padding: 4px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 600; margin-bottom: 10px;
    }
    .badge.hot { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
    .badge.warm { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .badge.cold { background: rgba(156, 163, 175, 0.15); color: var(--text-muted); }

    .score { position: absolute; top: 16px; right: 16px; font-size: 18px; font-weight: 700; }
    .score.high { color: var(--success); }
    .score.mid { color: var(--warning); }
    .score.low { color: var(--text-muted); }

    .lead-title { font-weight: 600; margin-bottom: 6px; }
    .lead-meta { color: var(--text-muted); font-size: 13px; margin-bottom: 12px; }
    .lead-actions { display: flex; gap: 8px; margin-top: 14px; }

    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
      z-index: 100; backdrop-filter: blur(6px);
    }
    .modal.open { opacity: 1; pointer-events: auto; }
    .modal-content {
      background: var(--surface); padding: 28px; border-radius: var(--radius);
      max-width: 500px; width: 90%; box-shadow: var(--shadow);
      transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .modal.open .modal-content { transform: translateY(0); }

    .toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--success);
      color: white; padding: 12px 18px; border-radius: var(--radius);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3); transform: translateY(20px); opacity: 0;
      transition: all 0.3s ease; z-index: 200;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    .loader {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.2); border-top-color: white;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-bar {
      height: 6px; background: rgba(255,255,255,0.05); border-radius: 999px; overflow: hidden; margin-top: 8px;
    }
    .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.6s ease; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state svg { width: 60px; height: 60px; margin-bottom: 16px; opacity: 0.4; }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .main { padding: 20px; }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="app">
    <aside class="sidebar">
      <div class="logo">⚡ LogiIntent AI</div>
      <div class="nav-item active">📊 Лиды</div>
      <div class="nav-item">🔍 Поиск</div>
      <div class="nav-item">📈 Аналитика</div>
      <div class="nav-item">⚙️ Настройки</div>
      <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
        <div class="nav-item">👤 Менеджер: Алексей К.</div>
      </div>
    </aside>

    <main class="main">
      <div class="header">
        <div>
          <div class="title">Панель предиктивных лидов</div>
          <div class="subtitle">AI анализирует ФТС, закупки, вакансии и геоданные в реальном времени</div>
        </div>
        <button class="btn" id="scanBtn">🔍 Запустить сканирование</button>
      </div>

      <div id="pipeline" class="pipeline">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke-width="2"/></svg>
          <div>Лиды не найдены. Нажмите «Запустить сканирование» для запуска AI-поиска.</div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal" id="leadModal">
    <div class="modal-content">
      <h3 id="modalTitle" style="margin-bottom: 8px;"></h3>
      <p id="modalMeta" style="color: var(--text-muted); margin-bottom: 16px; font-size: 14px;"></p>
      <div style="display: flex; gap: 10px;">
        <button class="btn" id="modalCall">📞 Позвонить</button>
        <button class="btn secondary" id="modalSend">📤 Отправить в CRM</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // === 3D Background Network Animation ===
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, nodes = [];
    function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; initNodes(); }
    function initNodes() {
      nodes = Array.from({length: 60}, () => ({
        x: Math.random() * width, y: Math.random() * height,
        vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
        r: 2 + Math.random() * 2
      }));
    }
    function draw() {
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = 'rgba(59,130,246,0.15)';
      nodes.forEach(n => {
        n.x += n.vx; n.y += n.vy;
        if(n.x < 0 || n.x > width) n.vx *= -1;
        if(n.y < 0 || n.y > height) n.vy *= -1;
        ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2); ctx.fill();
      });
      ctx.strokeStyle = 'rgba(59,130,246,0.08)';
      for(let i=0; i<nodes.length; i++) for(let j=i+1; j<nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < 120) { ctx.beginPath(); ctx.moveTo(nodes[i].x, nodes[i].y); ctx.lineTo(nodes[j].x, nodes[j].y); ctx.stroke(); }
      }
      requestAnimationFrame(draw);
    }
    window.addEventListener('resize', resize); resize(); draw();

    // === Lead Engine ===
    class LogiIntentEngine {
      constructor() {
        this.leads = [];
        this.state = 'idle';
        this.loadMockData();
      }

      loadMockData() {
        this.mockData = [
          { id: 1, company: 'ООО "ВостокЛогистик"', route: 'Москва → Владивосток', type: 'Сборный груз (5 тонн)', confidence: 87, status: 'hot', lpr: 'Иванов С.А. (Директор)', phone: '+7 999 111-22-33' },
          { id: 2, company: 'ИП Смирнов А.В.', route: 'Казань → Ростов-на-Дону', type: 'Паллеты (1.2 тонн)', confidence: 64, status: 'warm', lpr: 'Смирнов А.В. (Владелец)', phone: '+7 999 444-55-66' },
          { id: 3, company: 'АО "ПромТранс"', route: 'Новосибирск → Екатеринбург', type: 'Контейнер LCL', confidence: 41, status: 'cold', lpr: 'Петрова М.К. (Зам. директора)', phone: '+7 999 777-88-99' }
        ];
      }

      async scan() {
        if(this.state === 'scanning') return;
        this.state = 'scanning';
        const btn = document.getElementById('scanBtn');
        btn.innerHTML = '<span class="loader"></span> AI сканирует источники...';
        btn.disabled = true;

        await new Promise(r => setTimeout(r, 1800)); // Имитация задержки API

        this.leads = [...this.mockData];
        this.renderLeads();
        this.state = 'idle';
        btn.innerHTML = '🔍 Запустить сканирование';
        btn.disabled = false;
        this.showToast('✅ Найдено 3 релевантных лида. Готово к квалификации.');
      }

      renderLeads() {
        const container = document.getElementById('pipeline');
        container.innerHTML = '';
        if(!this.leads.length) {
          container.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke-width="2"/></svg><div>Нет активных лидов</div></div>`;
          return;
        }

        this.leads.forEach(lead => {
          const el = document.createElement('div');
          el.className = 'lead-card';
          el.innerHTML = `
            <span class="badge ${lead.status}">${lead.status === 'hot' ? '🔥 Горячий' : lead.status === 'warm' ? '🌤️ Тёплый' : '❄️ Холодный'}</span>
            <div class="score ${lead.confidence > 70 ? 'high' : lead.confidence > 45 ? 'mid' : 'low'}">${lead.confidence}%</div>
            <div class="lead-title">${lead.company}</div>
            <div class="lead-meta">📍 ${lead.route} • 📦 ${lead.type}</div>
            <div class="lead-meta">👤 ЛПР: ${lead.lpr}</div>
            <div class="lead-actions">
              <button class="btn" onclick="LogiIntent.showDetails(${lead.id})">👁️ Детали</button>
              <button class="btn secondary" onclick="LogiIntent.sendToCRM(${lead.id})">📥 В CRM</button>
            </div>
          `;
          container.appendChild(el);
        });
      }

      showDetails(id) {
        const lead = this.leads.find(l => l.id === id);
        if(!lead) return;
        document.getElementById('modalTitle').textContent = lead.company;
        document.getElementById('modalMeta').innerHTML = `
          Маршрут: ${lead.route}<br>
          Тип груза: ${lead.type}<br>
          ЛПР: ${lead.lpr}<br>
          Телефон: ${lead.phone}<br>
          Вероятность сделки: ${lead.confidence}%
        `;
        document.getElementById('leadModal').classList.add('open');
        document.getElementById('modalCall').onclick = () => this.callLead(lead);
        document.getElementById('modalSend').onclick = () => this.sendToCRM(lead.id);
      }

      closeModal() { document.getElementById('leadModal').classList.remove('open'); }
      callLead(lead) {
        this.showToast(`📞 Инициализация звонка на ${lead.phone}...`);
        setTimeout(() => this.showToast('✅ Соединение установлено. Запись активна.'), 1200);
      }
      async sendToCRM(id) {
        const lead = this.leads.find(l => l.id === id);
        if(!lead) return;
        this.showToast('📤 Отправка в amoCRM/Bitrix24...');
        await new Promise(r => setTimeout(r, 900));
        lead.status = 'sent';
        this.renderLeads();
        this.showToast('✅ Лид успешно добавлен в CRM. Создана сделка #8921');
      }

      showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
      }
    }

    const LogiIntent = new LogiIntentEngine();
    document.getElementById('scanBtn').addEventListener('click', () => LogiIntent.scan());
    document.getElementById('leadModal').addEventListener('click', (e) => {
      if(e.target.id === 'leadModal') LogiIntent.closeModal();
    });

    // 3D Tilt Effect
    document.querySelectorAll('.lead-card').forEach(card => {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left; const y = e.clientY - rect.top;
        const centerX = rect.width / 2; const centerY = rect.height / 2;
        const rotateX = ((y - centerY) / centerY) * -4;
        const rotateY = ((x - centerX) / centerX) * 4;
        card.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-4px)`;
      });
      card.addEventListener('mouseleave', () => { card.style.transform = ''; });
    });
  </script>
</body>
</html>
